<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <meta name="viewport" content="width=1080, height=1920">
    <title>壹格专升本 - 政策咨询速递</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: #4c0519; /* 玫瑰红深色底 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #ffffff;
        }

        /* 极光动感红橙紫色渐变底色 */
        .aurora-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                #500724 0%, 
                #881337 30%, 
                #c2410c 70%, 
                #7c2d12 100%);
            z-index: 0;
        }

        /* 极光发光光晕层 */
        .aurora-glow {
            position: absolute;
            inset: 0;
            z-index: 1;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .glow-orb-1 {
            position: absolute;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(251, 146, 60, 0.25) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            filter: blur(80px);
        }

        .glow-orb-2 {
            position: absolute;
            width: 1000px;
            height: 1000px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(225, 29, 72, 0.2) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            filter: blur(100px);
        }

        /* 炫酷流线装饰 */
        .glow-line {
            position: absolute;
            width: 1500px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(251, 146, 60, 0.45), rgba(244, 63, 94, 0.3), transparent);
            filter: blur(1px);
        }
        .glow-line.l1 { top: 25%; left: -200px; transform: rotate(15deg); }
        .glow-line.l2 { bottom: 30%; right: -200px; transform: rotate(-25deg); }

        /* 动感微小星光 */
        .star-grid {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.15) 1.5px, transparent 1.5px),
                radial-gradient(rgba(251, 146, 60, 0.1) 2px, transparent 2px);
            background-size: 50px 50px, 120px 120px;
            background-position: 0 0, 25px 25px;
            opacity: 0.8;
            z-index: 1;
        }

        /* 主容器 */
        .page-container {
            position: relative;
            z-index: 2;
            width: 1080px;
            height: 1920px;
            padding: 100px 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* 顶部速报分类微章 */
        .badge-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .badge-flash {
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 50%, #f43f5e 100%);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            padding: 14px 45px;
            font-size: 34px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 5px;
            text-align: center;
            box-shadow: 
                0 0 35px rgba(244, 63, 94, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.4);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .badge-flash::before, .badge-flash::after {
            content: '✦';
            color: #fef08a;
            font-size: 28px;
            text-shadow: 0 0 10px #fef08a;
        }

        /* 亮眼标题区 */
        .title-wrapper {
            width: 100%;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .title {
            font-size: 78px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.35;
            letter-spacing: 4px;
            text-shadow: 
                0 0 25px rgba(255, 255, 255, 0.45),
                0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
        }

        .title-accent-line {
            width: 250px;
            height: 6px;
            background: linear-gradient(90deg, transparent, #fb7185, #fdba74, transparent);
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(251, 146, 60, 0.5);
        }

        /* 巨大磨砂玻璃卡片 */
        .content-card {
            width: 100%;
            flex: 1;
            margin-bottom: 60px;
            position: relative;
            padding: 70px 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.11) 0%, 
                rgba(255, 255, 255, 0.04) 100%);
            border: 2px solid rgba(255, 255, 255, 0.16);
            border-radius: 36px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 0;
            box-shadow: 
                0 35px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 3px rgba(255, 255, 255, 0.2);
        }

        /* 斑斓的精细红橙边角挂件 */
        .card-deco {
            position: absolute;
            width: 35px;
            height: 35px;
            border: 4px solid #fda4af;
            z-index: 1;
        }
        .card-deco.tl { top: 25px; left: 25px; border-right: none; border-bottom: none; border-radius: 10px 0 0 0; }
        .card-deco.tr { top: 25px; right: 25px; border-left: none; border-bottom: none; border-radius: 0 10px 0 0; }
        .card-deco.bl { bottom: 25px; left: 25px; border-right: none; border-top: none; border-radius: 0 0 0 10px; }
        .card-deco.br { bottom: 25px; right: 25px; border-left: none; border-top: none; border-radius: 0 0 10px 0; }

        /* 卡片侧边发光点 */
        .card-light-dots {
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-light-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #fb7185;
            box-shadow: 0 0 15px #fb7185;
            border: 2px solid #ffffff;
        }
        .card-light-dots.right {
            left: auto;
            right: -8px;
        }
        .card-light-dots.right .card-light-dot {
            background-color: #fdba74;
            box-shadow: 0 0 15px #fdba74;
        }

        /* 咨询正文字体 */
        .text-area {
            position: relative;
            z-index: 1;
            font-size: 46px;
            color: #ffffff;
            text-align: justify;
            line-height: 1.95;
            font-weight: 500;
            letter-spacing: 0.5px;
            white-space: pre-line;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
            width: 100%;
        }

        /* 考点或政策高亮标红 */
        .highlight-text {
            color: #fef08a;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(254, 240, 138, 0.4);
            border-bottom: 2px dashed #fef08a;
            padding-bottom: 2px;
        }

        /* 底部励志寄语栏 */
        .slogan-banner {
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding: 18px 0;
            text-align: center;
            margin-bottom: 50px;
            font-size: 28px;
            font-weight: 600;
            color: #fdba74;
            letter-spacing: 3px;
        }

        /* 底部作者及品牌信息 */
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding-top: 35px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 0;
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, #fb7185, transparent);
            box-shadow: 0 0 10px #fb7185;
        }

        .footer::after {
            content: '';
            position: absolute;
            top: -3px;
            right: 0;
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #fdba74);
            box-shadow: 0 0 10px #fdba74;
        }

        .author-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .author-name {
            font-size: 38px;
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .author-dots {
            display: flex;
            gap: 6px;
        }

        .author-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #fb7185;
            box-shadow: 0 0 8px #fb7185;
        }
        .author-dot.gold {
            background-color: #fdba74;
            box-shadow: 0 0 8px #fdba74;
        }

        .author-description {
            font-size: 26px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
            max-width: 580px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .brand-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 800;
            color: #fdba74;
            letter-spacing: 2px;
            position: relative;
            text-shadow: 0 0 12px rgba(253, 186, 116, 0.4);
            padding-right: 20px;
        }

        .brand-name::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #fdba74;
            box-shadow: 0 0 10px #fdba74;
        }

        .brand-bars {
            display: flex;
            gap: 6px;
        }

        .brand-bar {
            width: 32px;
            height: 5px;
            border-radius: 10px;
            background: linear-gradient(90deg, #fdba74, #fb7185);
        }
        .brand-bar:nth-child(2) { width: 22px; }
        .brand-bar:nth-child(3) { width: 14px; }

    </style>
</head>
<body>
    <!-- 斑斓绚丽的极光动感背景 -->
    <div class="aurora-bg"></div>
    <div class="aurora-glow">
        <div class="glow-orb-1"></div>
        <div class="glow-orb-2"></div>
        <div class="glow-line l1"></div>
        <div class="glow-line l2"></div>
    </div>
    <div class="star-grid"></div>

    <!-- 主容器 -->
    <div class="page-container">
        <!-- 顶部徽章 -->
        <div class="badge-container">
            <div class="badge-flash">{{badge=政策速递}}</div>
        </div>

        <!-- 政策大标题 -->
        <div class="title-wrapper">
            <div class="title">{{title}}</div>
            <div class="title-accent-line"></div>
        </div>

        <!-- 长文字磨砂玻璃卡片 -->
        <div class="content-card">
            <div class="card-bg"></div>
            <div class="card-deco tl"></div>
            <div class="card-deco tr"></div>
            <div class="card-deco bl"></div>
            <div class="card-deco br"></div>

            <div class="card-light-dots">
                <div class="card-light-dot"></div>
                <div class="card-light-dot"></div>
            </div>
            <div class="card-light-dots right">
                <div class="card-light-dot"></div>
                <div class="card-light-dot"></div>
            </div>

            <!-- 正文区域 -->
            <div class="text-area">{{text}}</div>
        </div>

        <!-- 底部口号寄语条 -->
        <div class="slogan-banner">{{slogan=祝您再上一格 • 一站式上岸}}</div>

        <!-- 底部品牌签名区 -->
        <div class="footer">
            <div class="author-info">
                <div class="author-name">
                    <div class="author-dots">
                        <div class="author-dot"></div>
                        <div class="author-dot gold"></div>
                    </div>
                    {{author=壹格专升本}}
                </div>
                <div class="author-description">{{describe=壹格专升本（江西），祝您再上一格。政策解读|数据对比 丨备考资料，一站式上岸。}}</div>
            </div>
            <div class="brand-box">
                <div class="brand-name">{{brand=壹格专升本}}</div>
                <div class="brand-bars">
                    <div class="brand-bar"></div>
                    <div class="brand-bar"></div>
                    <div class="brand-bar"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
